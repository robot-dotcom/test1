<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Select food items and send your order via WhatsApp">
  <title>Food Order Selector</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* ... your existing CSS with these additions ... */
    
    /* 🔽 ADD THESE CSS IMPROVEMENTS 🔽 */
    
    /* Focus indicators for accessibility */
    .filter-btn:focus,
    .search-wrap input:focus,
    .qty-btn:focus,
    .btn:focus,
    .special-notes:focus,
    .phone-row input:focus {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }
    
    .filter-btn:focus:not(:focus-visible),
    .btn:focus:not(:focus-visible) {
      outline: none;
    }
    
    .filter-btn:focus-visible,
    .btn:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }
    
    /* Reduced motion preference */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      .item { transition: none !important; }
      .item img { transition: none !important; }
    }
    
    /* Error state styling */
    .phone-row input.error {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(226, 75, 74, 0.15);
    }
    
    .error-msg {
      color: var(--danger);
      font-size: 0.75rem;
      margin-top: 4px;
      display: none;
    }
    .error-msg.show { display: block; animation: fadeSlideUp 0.3s ease; }
    
    /* Undo toast */
    .toast.undo { background: var(--text); }
    .toast.undo .undo-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      border-radius: 12px;
      padding: 4px 10px;
      margin-left: 8px;
      color: inherit;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .toast.undo .undo-btn:hover { background: rgba(255,255,255,0.3); }
    
    /* Remove item button in order list */
    .order-list .remove-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.8rem;
      transition: color 0.2s, background 0.2s;
    }
    .order-list .remove-btn:hover {
      color: var(--danger);
      background: rgba(226, 75, 74, 0.1);
    }
    
    /* Category count badge */
    .filter-btn .count {
      font-size: 0.7rem;
      background: var(--primary-light);
      color: var(--primary);
      padding: 1px 6px;
      border-radius: 10px;
      margin-left: 4px;
      font-weight: 600;
    }
    @media (prefers-color-scheme: dark) {
      .filter-btn .count {
        background: rgba(92,110,247,0.2);
        color: #a5b4fc;
      }
    }
    
    /* Print styles */
    @media print {
      body { background: #fff; color: #000; padding: 0; }
      .toolbar, .sidebar .btn, .qty-controls, .search-wrap { display: none !important; }
      .page { display: block; }
      .sidebar { position: static; width: 100%; }
      .summary-card { border: 1px solid #000; box-shadow: none; }
      .item { break-inside: avoid; page-break-inside: avoid; }
    }
  </style>
</head>
<body>

<!-- ... your HTML structure ... -->

<!-- 🔽 ADD THESE HTML IMPROVEMENTS 🔽 -->

<!-- In filter buttons, add counts -->
<button class="filter-btn active" data-cat="all" aria-pressed="true">
  All <span class="count" data-cat="all">19</span>
</button>
<button class="filter-btn" data-cat="western" aria-pressed="false">
  Western <span class="count" data-cat="western">5</span>
</button>
<!-- ... etc for other categories ... -->

<!-- In order list items, add remove button -->
<!-- This is generated dynamically in JS, see below -->

<!-- Phone input helper text -->
<div class="phone-row">
  <i class="fab fa-whatsapp" aria-hidden="true"></i>
  <input type="tel" id="phoneInput" placeholder="601112345678" 
         pattern="^\d{10,15}$" aria-describedby="phoneHelp phoneError" />
</div>
<small id="phoneHelp" style="color:var(--text-muted);font-size:0.75rem;display:block;margin:-8px 0 4px 28px;">
  Format: country code + number (e.g., 601112345678)
</small>
<div id="phoneError" class="error-msg" role="alert">Please enter a valid phone number</div>

<!-- ... rest of your HTML ... -->

<script>
/**
 * Food Order Selector - Improved Version
 * Features: accessibility, persistence, validation, undo
 */
(function() {
  'use strict';
  
  // 🎯 Configuration
  const CONFIG = {
    MAX_ITEMS: 20,
    UNDO_TIMEOUT: 5000,
    DEBOUNCE_MS: 300,
    PARTICLE_COLORS: ['#5c6ef7','#a78bfa','#2eb872','#f59e0b','#ef4444','#ec4899'],
    STORAGE_KEY: 'foodOrderData'
  };

  // 📦 State Management
  const state = {
    orders: new Map(),
    lastCleared: null,
    undoTimer: null,
    searchDebounce: null
  };

  // 🎨 DOM References (cached for performance)
  const DOM = {};
  
  function initDOM() {
    DOM.grid = document.getElementById('grid');
    DOM.progressBar = document.getElementById('progressBar');
    DOM.badgeCount = document.getElementById('badgeCount');
    DOM.summaryCard = document.getElementById('summaryCard');
    DOM.emptyState = document.getElementById('emptyState');
    DOM.orderContent = document.getElementById('orderContent');
    DOM.orderList = document.getElementById('orderList');
    DOM.orderTotal = document.getElementById('orderTotal');
    DOM.notesInput = document.getElementById('notesInput');
    DOM.phoneInput = document.getElementById('phoneInput');
    DOM.phoneError = document.getElementById('phoneError');
    DOM.toast = document.getElementById('toast');
    DOM.toastMsg = document.getElementById('toastMsg');
    DOM.filterBtns = document.querySelectorAll('.filter-btn');
    DOM.searchInput = document.getElementById('searchInput');
  }

  // 🎭 Animation Helpers
  const Animations = {
    spawnRipple(el, e) {
      const rc = el.querySelector('.ripple-container');
      if (!rc) return;
      const rect = el.getBoundingClientRect();
      const ripple = document.createElement('div');
      ripple.className = 'ripple-circle';
      ripple.style.left = (e.clientX - rect.left) + 'px';
      ripple.style.top = (e.clientY - rect.top) + 'px';
      rc.appendChild(ripple);
      ripple.addEventListener('animationend', () => ripple.remove(), { once: true });
    },
    
    spawnParticles(el) {
      const rect = el.getBoundingClientRect();
      for (let i = 0; i < 8; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.background = CONFIG.PARTICLE_COLORS[Math.floor(Math.random() * CONFIG.PARTICLE_COLORS.length)];
        p.style.left = (rect.left + rect.width * Math.random()) + 'px';
        p.style.top = (rect.top + rect.height * Math.random()) + 'px';
        p.style.animationDelay = (Math.random() * 0.18) + 's';
        p.style.animationDuration = (0.5 + Math.random() * 0.4) + 's';
        document.body.appendChild(p);
        p.addEventListener('animationend', () => p.remove(), { once: true });
      }
    },
    
    bump(el) {
      if (!el) return;
      el.classList.remove('bump');
      void el.offsetWidth; // reflow
      el.classList.add('bump');
    }
  };

  // 🔍 Search & Filter
  let activeCategory = 'all';
  
  function debounce(func, wait) {
    let timeout;
    return function executedFunction(...args) {
      const later = () => {
        clearTimeout(timeout);
        func(...args);
      };
      clearTimeout(timeout);
      timeout = setTimeout(later, wait);
    };
  }
  
  const applyFilters = debounce(function() {
    const query = DOM.searchInput.value.toLowerCase().trim();
    
    DOM.grid.querySelectorAll('.item').forEach(el => {
      const matchesCat = activeCategory === 'all' || el.dataset.cat === activeCategory;
      const matchesSearch = !query || el.dataset.name.toLowerCase().includes(query);
      el.classList.toggle('hidden', !(matchesCat && matchesSearch));
      // Update tabindex for keyboard nav
      el.tabIndex = (matchesCat && matchesSearch) ? 0 : -1;
    });
  }, CONFIG.DEBOUNCE_MS);

  function setCategory(category) {
    activeCategory = category;
    DOM.filterBtns.forEach(btn => {
      const isActive = btn.dataset.cat === category;
      btn.classList.toggle('active', isActive);
      btn.setAttribute('aria-pressed', isActive);
    });
    applyFilters();
  }

  // 🛒 Order Management
  function addItem(name, price, el) {
    if (state.orders.has(name)) return;
    state.orders.set(name, { qty: 1, price });
    el?.classList.add('selected', 'selecting');
    if (el) {
      Animations.spawnParticles(el);
      el.addEventListener('animationend', () => el.classList.remove('selecting'), { once: true });
    }
  }
  
  function removeItem(name, el) {
    if (!state.orders.has(name)) return;
    state.orders.delete(name);
    if (el) {
      el.classList.remove('selected');
      el.classList.add('deselecting');
      el.querySelector('.qty-val').textContent = '1';
      el.addEventListener('animationend', () => el.classList.remove('deselecting'), { once: true });
    }
  }
  
  function adjustQuantity(name, delta) {
    const item = state.orders.get(name);
    if (!item) return;
    item.qty = Math.max(1, item.qty + delta);
    return item.qty;
  }

  // 🔄 UI Updates
  function updateUI() {
    const values = Array.from(state.orders.values());
    const totalQty = values.reduce((sum, v) => sum + v.qty, 0);
    const totalPrice = values.reduce((sum, v) => sum + v.qty * v.price, 0);
    
    // Progress bar
    DOM.progressBar.style.width = totalQty === 0 ? '0%' : 
      `${Math.min(100, (totalQty / CONFIG.MAX_ITEMS) * 100)}%`;
    
    // Badge with animation
    DOM.badgeCount.textContent = totalQty;
    if (totalQty > 0) Animations.bump(DOM.badgeCount);
    
    // Card state
    DOM.summaryCard.classList.toggle('has-items', totalQty > 0);
    
    if (totalQty === 0) {
      DOM.emptyState.style.display = '';
      DOM.orderContent.style.display = 'none';
      persistOrder(); // Save empty state
      return;
    }
    
    DOM.emptyState.style.display = 'none';
    DOM.orderContent.style.display = '';
    
    // Order list with remove buttons
    DOM.orderList.innerHTML = Array.from(state.orders.entries()).map(([name, {qty, price}]) => `
      <li>
        <span class="item-name">${escapeHtml(name)}</span>
        <span class="item-qty">×${qty}</span>
        <span style="color:var(--text-muted);font-size:.8rem;">RM ${(qty*price).toFixed(2)}</span>
        <button class="remove-btn" aria-label="Remove ${escapeHtml(name)}" data-name="${escapeHtml(name)}">
          <i class="fas fa-times"></i>
        </button>
      </li>
    `).join('');
    
    // Total with pop animation
    DOM.orderTotal.textContent = `RM ${totalPrice.toFixed(2)}`;
    Animations.bump(DOM.orderTotal);
    
    persistOrder();
  }

  // 🔐 Security: XSS Prevention
  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
  
  function sanitizeNotes(text) {
    return text.replace(/[<>]/g, '').trim().slice(0, 200);
  }

  // 💾 Persistence
  function persistOrder() {
    try {
      const data = {
        orders: Array.from(state.orders.entries()),
        notes: DOM.notesInput.value,
        phone: DOM.phoneInput.value
      };
      localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(data));
    } catch (e) {
      console.warn('Failed to save order:', e);
    }
  }
  
  function loadOrder() {
    try {
      const saved = localStorage.getItem(CONFIG.STORAGE_KEY);
      if (!saved) return;
      const data = JSON.parse(saved);
      
      state.orders.clear();
      if (Array.isArray(data.orders)) {
        data.orders.forEach(([name, item]) => {
          state.orders.set(name, item);
          // Update UI for selected items
          const el = DOM.grid.querySelector(`.item[data-name="${CSS.escape(name)}"]`);
          if (el) {
            el.classList.add('selected');
            el.querySelector('.qty-val').textContent = item.qty;
          }
        });
      }
      if (data.notes) DOM.notesInput.value = data.notes;
      if (data.phone) DOM.phoneInput.value = data.phone;
      
      updateUI();
    } catch (e) {
      console.warn('Failed to load order:', e);
      localStorage.removeItem(CONFIG.STORAGE_KEY);
    }
  }

  // 📝 Message Builder
  function buildMessage() {
    const lines = Array.from(state.orders.entries()).map(([name, {qty, price}]) => 
      `  • ${name} ×${qty} — RM ${(qty * price).toFixed(2)}`
    );
    const total = Array.from(state.orders.values())
      .reduce((sum, v) => sum + v.qty * v.price, 0);
    const notes = sanitizeNotes(DOM.notesInput.value);
    const date = new Date().toLocaleString('en-MY', { 
      dateStyle: 'medium', timeStyle: 'short' 
    });
    
    let msg = `🍽️ *Food Order*\n📅 ${date}\n\n` + lines.join('\n');
    msg += `\n\n💰 *Total: RM ${total.toFixed(2)}*`;
    if (notes) msg += `\n\n📝 Notes: ${notes}`;
    return msg + '\n\nThank you! 🙏';
  }

  // 📋 Clipboard & WhatsApp
  async function copyOrder() {
    try {
      await navigator.clipboard.writeText(buildMessage());
      showToast('✓ Order copied to clipboard!');
    } catch (err) {
      // Fallback for older browsers
      const textarea = document.createElement('textarea');
      textarea.value = buildMessage();
      textarea.style.position = 'fixed';
      textarea.style.opacity = '0';
      document.body.appendChild(textarea);
      textarea.select();
      try {
        document.execCommand('copy');
        showToast('✓ Order copied!');
      } catch {
        showToast('✗ Failed to copy. Please select manually.', true);
      }
      document.body.removeChild(textarea);
    }
  }
  
  function validatePhone(phone) {
    // Remove all non-digits
    const clean = phone.replace(/\D/g, '');
    // Basic validation: 10-15 digits (international format)
    return /^\d{10,15}$/.test(clean) ? clean : null;
  }
  
  function sendWhatsApp() {
    const phone = validatePhone(DOM.phoneInput.value);
    
    if (!phone) {
      DOM.phoneInput.classList.add('error');
      DOM.phoneError?.classList.add('show');
      DOM.phoneInput.focus();
      showToast('✗ Please enter a valid phone number', true);
      return;
    }
    
    DOM.phoneInput.classList.remove('error');
    DOM.phoneError?.classList.remove('show');
    
    const url = `https://wa.me/${phone}?text=${encodeURIComponent(buildMessage())}`;
    const opened = window.open(url, '_blank');
    
    if (!opened || opened.closed || typeof opened.closed === 'undefined') {
      showToast('⚠️ WhatsApp blocked. Please allow popups.', true);
    } else {
      showToast('✓ Opening WhatsApp...');
    }
  }

  // 🗑️ Clear with Undo
  function clearOrder() {
    // Save state for undo
    state.lastCleared = {
      orders: new Map(state.orders),
      notes: DOM.notesInput.value,
      phone: DOM.phoneInput.value
    };
    
    // Clear current
    state.orders.clear();
    DOM.notesInput.value = '';
    DOM.phoneInput.value = '';
    
    // Update UI
    DOM.grid.querySelectorAll('.item.selected').forEach(el => {
      el.classList.remove('selected');
      el.classList.add('deselecting');
      el.querySelector('.qty-val').textContent = '1';
      el.addEventListener('animationend', () => el.classList.remove('deselecting'), { once: true });
    });
    
    updateUI();
    
    // Show undo toast
    showUndoToast();
  }
  
  function showUndoToast() {
    DOM.toastMsg.textContent = 'Order cleared';
    DOM.toast.innerHTML = `
      <i class="fas fa-undo" style="font-size:14px;"></i>
      <span id="toastMsg">Order cleared</span>
      <button class="undo-btn" id="undoBtn">Undo</button>
    `;
    DOM.toast.className = 'toast undo show';
    
    // Setup undo button
    document.getElementById('undoBtn')?.addEventListener('click', undoClear);
    
    // Auto-hide with undo window
    clearTimeout(state.undoTimer);
    state.undoTimer = setTimeout(() => {
      state.lastCleared = null;
      DOM.toast.classList.remove('show');
      DOM.toast.classList.add('hide');
      DOM.toast.addEventListener('animationend', () => {
        DOM.toast.className = 'toast';
        DOM.toast.innerHTML = '<i class="fas fa-check-circle" style="font-size:14px;"></i><span id="toastMsg"></span>';
      }, { once: true });
    }, CONFIG.UNDO_TIMEOUT);
  }
  
  function undoClear() {
    if (!state.lastCleared) return;
    
    state.orders = state.lastCleared.orders;
    DOM.notesInput.value = state.lastCleared.notes || '';
    DOM.phoneInput.value = state.lastCleared.phone || '';
    
    // Restore item selection UI
    DOM.grid.querySelectorAll('.item').forEach(el => {
      const name = el.dataset.name;
      if (state.orders.has(name)) {
        el.classList.add('selected');
        el.querySelector('.qty-val').textContent = state.orders.get(name).qty;
      }
    });
    
    state.lastCleared = null;
    clearTimeout(state.undoTimer);
    
    updateUI();
    showToast('✓ Order restored');
    
    // Hide toast
    DOM.toast.classList.remove('show');
    DOM.toast.classList.add('hide');
  }

  // 🔔 Toast Notifications
  let toastTimer;
  function showToast(message, isError = false) {
    DOM.toastMsg.textContent = message;
    DOM.toast.className = `toast${isError ? ' error' : ''} show`;
    
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => {
      DOM.toast.classList.remove('show');
      DOM.toast.classList.add('hide');
      DOM.toast.addEventListener('animationend', () => {
        DOM.toast.className = 'toast';
      }, { once: true });
    }, 2400);
  }

  // ⌨️ Event Handlers (Event Delegation)
  function setupEventListeners() {
    // Filter buttons
    DOM.grid.closest('.page').addEventListener('click', (e) => {
      const filterBtn = e.target.closest('.filter-btn');
      if (filterBtn) {
        e.preventDefault();
        setCategory(filterBtn.dataset.cat);
      }
    });
    
    // Item selection (delegated)
    DOM.grid.addEventListener('click', (e) => {
      const item = e.target.closest('.item');
      if (!item || e.target.closest('.qty-controls') || e.target.closest('.remove-btn')) return;
      
      Animations.spawnRipple(item, e);
      const name = item.dataset.name;
      const price = parseFloat(item.dataset.price);
      
      if (state.orders.has(name)) {
        removeItem(name, item);
      } else {
        addItem(name, price, item);
      }
      updateUI();
    });
    
    // Quantity controls (delegated)
    DOM.grid.addEventListener('click', (e) => {
      const btn = e.target.closest('.qty-btn');
      if (!btn) return;
      e.stopPropagation();
      
      const item = btn.closest('.item');
      const name = item.dataset.name;
      const delta = btn.textContent.trim() === '+' ? 1 : -1;
      
      const newQty = adjustQuantity(name, delta);
      if (newQty) {
        const valEl = item.querySelector('.qty-val');
        valEl.textContent = newQty;
        Animations.bump(valEl);
        updateUI();
      }
    });
    
    // Remove from order list (delegated)
    DOM.orderList?.addEventListener('click', (e) => {
      const removeBtn = e.target.closest('.remove-btn');
      if (!removeBtn) return;
      
      const name = removeBtn.dataset.name;
      const itemEl = DOM.grid.querySelector(`.item[data-name="${CSS.escape(name)}"]`);
      removeItem(name, itemEl);
      updateUI();
      showToast(`Removed ${name}`);
    });
    
    // Search input
    DOM.searchInput?.addEventListener('input', applyFilters);
    
    // Phone input validation
    DOM.phoneInput?.addEventListener('input', () => {
      if (DOM.phoneInput.classList.contains('error')) {
        const valid = validatePhone(DOM.phoneInput.value);
        if (valid) {
          DOM.phoneInput.classList.remove('error');
          DOM.phoneError?.classList.remove('show');
        }
      }
    });
    
    // Notes persistence
    DOM.notesInput?.addEventListener('input', debounce(persistOrder, 500));
    
    // Action buttons
    document.querySelector('.btn-primary')?.addEventListener('click', copyOrder);
    document.querySelector('.btn-wa')?.addEventListener('click', sendWhatsApp);
    document.querySelector('.btn-ghost')?.addEventListener('click', clearOrder);
    
    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      // Enter/Space on items
      if (e.key === 'Enter' || e.key === ' ') {
        const item = document.activeElement?.closest('.item');
        if (item && !item.classList.contains('hidden')) {
          e.preventDefault();
          item.click();
        }
      }
      // Escape to close/undo
      if (e.key === 'Escape' && state.lastCleared) {
        undoClear();
      }
    });
    
    // Image load handling
    document.querySelectorAll('.item img').forEach(img => {
      const wrap = img.closest('.img-wrap');
      if (img.complete) wrap?.classList.add('loaded');
      else img.addEventListener('load', () => wrap?.classList.add('loaded'), { once: true });
      img.addEventListener('error', () => {
        wrap.style.background = 'var(--border)';
        wrap.innerHTML = '<i class="fas fa-image" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--text-muted);font-size:2rem;opacity:0.3;"></i>';
      }, { once: true });
    });
  }

  // 🚀 Initialization
  function init() {
    initDOM();
    setupEventListeners();
    loadOrder();
    updateUI();
    
    // Staggered entrance animation
    document.querySelectorAll('.item').forEach((el, i) => {
      el.style.opacity = '0';
      el.style.transform = 'translateY(20px)';
      el.style.transition = 'opacity .4s ease, transform .4s ease';
      setTimeout(() => {
        el.style.opacity = '1';
        el.style.transform = 'translateY(0)';
      }, 60 + i * 35);
    });
    
    // Update category counts
    updateCategoryCounts();
  }
  
  function updateCategoryCounts() {
    const counts = { all: 0, western: 0, local: 0, dessert: 0 };
    DOM.grid.querySelectorAll('.item').forEach(el => {
      const cat = el.dataset.cat;
      counts.all++;
      if (counts[cat] !== undefined) counts[cat]++;
    });
    
    document.querySelectorAll('.count').forEach(span => {
      const cat = span.dataset.cat;
      if (counts[cat] !== undefined) {
        span.textContent = counts[cat];
      }
    });
  }

  // Start the app
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
  
})();
</script>
</body>
</html>
